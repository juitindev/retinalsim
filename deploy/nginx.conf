server {
    listen 80;
    server_name _;

    # Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy — all backend endpoints
    location /simulate {
        proxy_pass http://backend:8000/simulate;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;  # model build can take time
        client_max_body_size 10M;
    }

    location /simulate_upload {
        proxy_pass http://backend:8000/simulate_upload;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    location /test_patterns {
        proxy_pass http://backend:8000/test_patterns;
        proxy_set_header Host $host;
    }

    location /preview_pattern/ {
        proxy_pass http://backend:8000/preview_pattern/;
        proxy_set_header Host $host;
    }

    location /single_phosphene {
        proxy_pass http://backend:8000/single_phosphene;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # Health check
    location = /api/health {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
    }
}
